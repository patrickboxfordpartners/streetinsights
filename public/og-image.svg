<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0f1a"/>
      <stop offset="100%" stop-color="#1a1f35"/>
    </linearGradient>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f766e" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#0f766e" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#1e293b" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Chart line graphic -->
  <path d="M 100 450 L 200 430 L 300 440 L 400 390 L 500 410 L 600 350 L 700 320 L 750 340 L 800 290 L 850 300 L 900 250 L 950 260 L 1000 220 L 1050 230 L 1100 190" fill="none" stroke="url(#line-grad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Glow area under chart -->
  <path d="M 100 450 L 200 430 L 300 440 L 400 390 L 500 410 L 600 350 L 700 320 L 750 340 L 800 290 L 850 300 L 900 250 L 950 260 L 1000 220 L 1050 230 L 1100 190 L 1100 500 L 100 500 Z" fill="url(#glow)"/>

  <!-- Secondary chart line -->
  <path d="M 100 420 L 200 425 L 300 415 L 400 430 L 500 420 L 600 400 L 700 410 L 750 395 L 800 380 L 850 385 L 900 370 L 950 365 L 1000 350 L 1050 355 L 1100 340" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>

  <!-- Data points on main line -->
  <circle cx="600" cy="350" r="4" fill="#14b8a6" opacity="0.8"/>
  <circle cx="900" cy="250" r="4" fill="#14b8a6" opacity="0.8"/>
  <circle cx="1100" cy="190" r="4" fill="#14b8a6" opacity="0.8"/>

  <!-- Brand name -->
  <text x="100" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#ffffff" letter-spacing="-1">Street Insights</text>

  <!-- Subtitle -->
  <text x="100" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#94a3b8">AI-Powered Stock Sentiment Tracking</text>

  <!-- Accent bar -->
  <rect x="100" y="280" width="60" height="3" rx="1.5" fill="#0f766e"/>

  <!-- Bottom domain text -->
  <text x="100" y="570" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="400" fill="#475569">getstreetinsights.com</text>
</svg>
